apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: profilarr
  namespace: media
spec:
  selector:
    matchLabels:
      app: profilarr
  serviceName: "profilarr"
  replicas: 1
  template:
    metadata:
      labels:
        app: profilarr
    spec:
      containers:
        - name: profilarr
          image: ghcr.io/dictionarry-hub/profilarr:2.0.8
          ports:
            - containerPort: 6868
              name: http
          volumeMounts:
            - name: data
              mountPath: /config
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: UMASK
              value: "022"
            - name: TZ
              value: "Europe/Amsterdam"
            - name: AUTH
              value: "off"
            - name: ORIGIN
              value: "https://profilarr.media.i.as216455.net"
          livenessProbe:
            tcpSocket:
              port: 6868
            initialDelaySeconds: 5
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: "ceph-rbd-pve"
        resources:
          requests:
            storage: 5Gi
