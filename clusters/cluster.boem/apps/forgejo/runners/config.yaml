
apiVersion: v1
kind: ConfigMap
metadata:
  name: runner-config
  namespace: forgejo-runner
  labels:
    app: forgejo-runner
data:
  podspec-default.yaml: |-
    runtimeClassName: gvisor
    nodeName: k-work-4
    containers:
      - env:
          - name: DEBIAN_FRONTEND
            value: noninteractive
        image: ghcr.io/bjw-s-labs/forgejo-runner:ubuntu-24.04@sha256:4288050ddd71ac2e5f42465c474aec8b838792dec85bb284405db7c180138580
        imagePullPolicy: IfNotPresent
        name: main
        resources:
          limits:
            cpu: 500m
            memory: 2Gi
          requests:
            cpu: 100m
            memory: 256Mi
    restartPolicy: Never
  #    runtimeClassName: gvisor
  #    nodeName: k-work-4
  podspec-dind.yaml: |-
    initContainers:
      - name: dind
        image: docker:29-dind
        securityContext:
          privileged: true
        restartPolicy: Always
        env:
          - name: DOCKER_TLS_CERTDIR
            value: /certs
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 4Gi
        volumeMounts:
          - name: docker-storage
            mountPath: /var/lib/docker
          - name: docker-certs
            mountPath: /certs
        readinessProbe:
          exec:
            command:
              - sh
              - -c
              - test -f /certs/client/ca.pem && test -f /certs/client/cert.pem && test -f /certs/client/key.pem
          initialDelaySeconds: 2
          periodSeconds: 1
    containers:
      - env:
          - name: DEBIAN_FRONTEND
            value: noninteractive
          - name: DOCKER_HOST
            value: tcp://localhost:2376
          - name: DOCKER_TLS_VERIFY
            value: "1"
          - name: DOCKER_CERT_PATH
            value: /certs/client
        image: ghcr.io/bjw-s-labs/forgejo-runner:ubuntu-24.04@sha256:4288050ddd71ac2e5f42465c474aec8b838792dec85bb284405db7c180138580
        imagePullPolicy: IfNotPresent
        name: main
        resources:
          limits:
            cpu: 500m
            memory: 2Gi
          requests:
            cpu: 100m
            memory: 256Mi
        volumeMounts:
          - name: docker-certs
            mountPath: /certs
            readOnly: true
    volumes:
      - name: docker-storage
        emptyDir: {}
      - name: docker-certs
        emptyDir: {}
    restartPolicy: Never
  runner.yaml: |-
    cache:
      enabled: true
      dir: /data/cache
    container:
      docker_host: "-"
      workdir_parent: shared/workdir
    host:
      workdir_parent: /data/act
    kubernetes:
      namespace: forgejo-runner
      poll_timeout: 10m
    log:
      level: info
    plugins:
      k8s:
        address: "unix:///plugin/forgejo-runner-k8s.sock"
        options:
          namespace: forgejo-runner
          poll_timeout: 10m
    runner:
      capacity: 4
      labels:
        - ubuntu-latest:k8s:/config/podspec-default.yaml
        - default:k8s:/config/podspec-default.yaml
        - docker:k8s:/config/podspec-dind.yaml
      timeout: 3h

#  - multiarch:k8s:/config/podspec-dind.yaml  # you need binfmt-misc extension for multiarch
