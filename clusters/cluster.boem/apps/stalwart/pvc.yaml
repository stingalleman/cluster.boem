apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: stalwart-data
  namespace: stalwart
spec:
  storageClassName: ceph-rbd-pve
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: stalwart-config
  namespace: stalwart
spec:
  storageClassName: ceph-rbd-pve
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
