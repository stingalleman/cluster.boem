apiVersion: v1
kind: Service
metadata:
  name: doubleblind-site
  namespace: default
spec:
  selector:
    app: doubleblind-site
  type: ClusterIP
  sessionAffinity: None
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
