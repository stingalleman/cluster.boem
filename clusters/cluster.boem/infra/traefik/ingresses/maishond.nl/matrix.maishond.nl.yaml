apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: matrix.maishond.nl
  namespace: traefik
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - kind: Rule
      match: Host(`whatsapp.bridge.matrix.maishond.nl`)
      services:
        - kind: Service
          name: whatsapp-bridge
          namespace: matrix
          port: appservice

    - kind: Rule
      match: Host(`signal.bridge.matrix.maishond.nl`)
      services:
        - kind: Service
          name: signal-bridge
          namespace: matrix
          port: appservice

  tls:
    secretName: matrix-maishond.nl-prod-tls
