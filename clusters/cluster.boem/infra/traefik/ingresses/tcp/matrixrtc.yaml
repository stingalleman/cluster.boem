apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: matrixrtc-tcp-ingress
  namespace: traefik
spec:
  entryPoints:
    - matrixrtc-tcp
  tls:
    # passthrough: true
    secretName: maishond.nl-prod-tls
  routes:
    - match: HostSNI(`*`)
      services:
        - name: matrix-stack-matrix-rtc-sfu-tcp
          namespace: matrix
          port: 30002
          # proxyProtocol:
          #   version: 1
