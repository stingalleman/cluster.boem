apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: pop3s-ingress
  namespace: traefik
spec:
  entryPoints:
    - pop3s
  tls:
    passthrough: true
  routes:
    - match: HostSNI(`*`)
      services:
        - name: stalwart
          namespace: stalwart
          port: pop3s
          proxyProtocol:
            version: 2
