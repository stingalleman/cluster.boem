apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: imap-ingress
  namespace: traefik
spec:
  entryPoints:
    - imap
  routes:
    - match: HostSNI(`*`)
      services:
        - name: stalwart
          namespace: stalwart
          port: imap
