# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: cluster-api
  namespace: cluster-api
spec:
  chart:
    spec:
      chart: cluster-api-operator
      #version: "1.19.0"
      sourceRef:
        kind: HelmRepository
        name: cluster-api
        namespace: flux-system
  interval: 24h
  timeout: 90s
  values:
    bootstrap:
      talos:
        enabled: true
    controlPlane:
      talos:
        enabled: true
    infrastructure:
      proxmox:
        enabled: true
    ipam:
      in-cluster:
        enabled: true
    configSecret:
      name: pve
      namespace: cluster-api
