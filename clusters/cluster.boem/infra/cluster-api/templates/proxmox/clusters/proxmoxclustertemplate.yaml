apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
kind: ProxmoxClusterTemplate
metadata:
  name: talos-proxmox-clusterclass-v0.0.1
  namespace: capi
spec:
  template:
    spec:
      schedulerHints:
        memoryAdjustment: 0
      allowedNodes:
      - pve
      controlPlaneEndpoint:
        host: 10.10.104.11
        port: 6443
      dnsServers:
        - 10.10.10.10
      ipv4Config:
        addresses:
        - 10.10.104.100-10.10.104.200
        gateway: 10.10.104.1
        prefix: 24
