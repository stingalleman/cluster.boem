apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: ProxmoxMachineTemplate
metadata:
  name: worker-template
  namespace: cluster-api
spec:
  template:
    spec:
      disks:
        bootVolume:
          disk: scsi0
          sizeGb: 32
      format: qcow2
      full: true
      memoryMiB: 16384
      network:
        default:
          bridge: vmbr2
          model: virtio
          vlan: 102
      numCores: 12
      numSockets: 1
      sourceNode: pve
      templateID: 9001
      pool: cluster-api
      vmIDRange:
        start: 2200
        end: 2299
      checks:
        skipCloudInitStatus: true
      metadataSettings:
        providerIDInjection: true
